<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bloxd Tier Rankings</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        :root {
            --bg: #090a0f;
            --card: #12141c;
            --border: #232736;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --tier-ht: #f59e0b;
            --tier-lt: #8b5cf6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 20px 10px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        /* --- Header --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 24px; font-weight: 900; letter-spacing: -1px; margin: 0; }
        .live-sync { display: flex; align-items: center; }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background-color: #22c55e; box-shadow: 0 0 8px #22c55e;
        }

        /* --- Table --- */
        .table-header {
            display: grid; grid-template-columns: 40px 1fr 90px 90px;
            padding: 0 16px 12px; font-size: 11px; font-weight: 700; color: var(--text-muted);
        }

        .list { display: flex; flex-direction: column; gap: 8px; }

        .row {
            display: grid; grid-template-columns: 40px 1fr 90px 90px; align-items: center;
            background-color: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 16px; transition: border-color 0.2s;
        }
        .row.is-me { border-color: var(--accent); background: #171b28; }

        .rank { font-weight: 700; color: var(--text-muted); font-size: 15px; }
        
        .name-wrapper { display: flex; align-items: center; gap: 4px; overflow: hidden; }
        .name { 
            font-weight: 700; font-size: 16px; white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis; margin-right: 4px;
        }
        
        /* アクションボタン (編集・削除) */
        .action-btn {
            background: none; border: none; fill: var(--text-muted); cursor: pointer;
            padding: 4px; border-radius: 4px; display: none; align-items: center; justify-content: center;
        }
        .is-me .action-btn { display: flex; }
        .action-btn:hover { background: rgba(255, 255, 255, 0.1); fill: var(--text-main); }
        .action-btn.del:hover { background: rgba(239, 68, 68, 0.2); fill: var(--danger); }
        .action-btn svg { width: 14px; height: 14px; }

        /* --- Icons --- */
        .tier-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .icon {
            width: 40px; height: 40px; background: #1a1d27; border: 1px solid var(--border);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        
        /* 剣とスパイクをグレー単色で統一 */
        .icon svg { width: 22px; height: 22px; fill: var(--text-muted); transition: fill 0.2s; }
        
        .is-me .icon { cursor: pointer; border-color: #334155; }
        .is-me .icon:hover { border-color: var(--accent); background: #1e293b; }
        .is-me .icon:hover svg { fill: var(--text-main); }

        .tier-text { font-size: 10px; font-weight: 900; text-align: center; line-height: 1.2; }
        .t-HT { color: var(--tier-ht); }
        .t-LT { color: var(--tier-lt); }
        .t-Un { color: var(--text-muted); } /* Unranked color */

        /* --- Modals --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--card); width: 90%; max-width: 420px;
            border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-align: center;
        }
        h2 { font-size: 20px; margin-bottom: 10px; font-weight: 900; }
        p.desc { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
        input {
            width: 100%; padding: 14px; background: var(--bg); border: 1px solid var(--border);
            color: white; border-radius: 8px; font-size: 16px; margin-bottom: 10px; font-family: inherit; font-weight: 600;
        }
        .error-msg { color: var(--danger); font-size: 12px; margin-bottom: 15px; height: 14px; font-weight: 600;}
        
        .btn {
            width: 100%; padding: 14px; background: var(--accent); color: white;
            border: none; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer;
        }

        .tier-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 50vh; overflow-y: auto;
        }
        .t-btn {
            background: #1a1d27; border: 1px solid var(--border); color: var(--text-main);
            padding: 14px 10px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer;
        }
        .t-btn:hover { border-color: var(--accent); color: var(--accent); background: #1e293b; }
        .t-btn.full-width { grid-column: 1 / -1; background: #232736; border-color: #334155; color: var(--text-muted); }
        .t-btn.full-width:hover { border-color: var(--text-main); color: var(--text-main); }

        @media (max-width: 480px) {
            .table-header, .row { grid-template-columns: 30px 1fr 75px 75px; padding: 10px; gap: 4px; }
            .icon { width: 34px; height: 34px; }
            .icon svg { width: 18px; height: 18px; }
            .tier-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>RANKINGS</h1>
            <div class="live-sync" title="Connected">
                <div class="dot"></div>
            </div>
        </header>

        <div class="table-header">
            <div>#</div>
            <div>PLAYER</div>
            <div style="text-align: center;">SURFACE</div>
            <div style="text-align: center;">UNDERG</div>
        </div>

        <div id="list" class="list">
            <!-- プレイヤーリスト -->
        </div>
    </div>

    <!-- 名前登録/変更 モーダル -->
    <div id="modal-name" class="modal">
        <div class="modal-content">
            <h2 id="name-modal-title">ENTER NAME</h2>
            <p class="desc">Letters, numbers, and underscores (_) only. Min 3 chars.</p>
            <input type="text" id="username" placeholder="Your_Name" maxlength="15">
            <div id="name-error" class="error-msg"></div>
            <button id="btn-submit-name" class="btn" onclick="app.submitName()">JOIN</button>
        </div>
    </div>

    <!-- Tier編集モーダル -->
    <div id="modal-edit" class="modal">
        <div class="modal-content">
            <h2 id="edit-title">SELECT TIER</h2>
            <div id="tier-btns" class="tier-grid"></div>
        </div>
    </div>

    <script>
        const app = {
            brokerUrl: 'wss://public:public@public.cloud.shiftr.io',
            topic: 'bloxd/official/tiers_v5', // トピック名を変更して古いデータをリセット
            
            icons: {
                // 剣の交差 (絵文字 ⚔️ のような形状)
                sfc: `<svg viewBox="0 0 24 24"><path d="M14.1,9.5L13,8.4L5.6,15.8C5.2,16.2 5.2,16.9 5.6,17.3L6.7,18.4C7.1,18.8 7.8,18.8 8.2,18.4L15.6,11L14.5,9.9V9.5 M21,3L18.8,5.2L15.3,1.7L13.9,3.1L17.4,6.6L12.4,11.6L14.5,13.7L19.5,8.7L23,12.2L24.4,10.8L20.9,7.3L23.1,5.1L21,3 M3,21L5.2,18.8L1.7,15.3L3.1,13.9L6.6,17.4L11.6,12.4L13.7,14.5L8.7,19.5L12.2,23L10.8,24.4L7.3,20.9L5.1,23.1L3,21Z"/></svg>`,
                // スパイク (ピクセル感を残しつつ、色はグレー単色)
                ugd: `<svg viewBox="0 0 24 24" shape-rendering="crispEdges"><path d="M5 20h4v-9H5z M11 20h4V5h-4z M17 20h4v-7h-4z"/></svg>`,
                // 鉛筆アイコン
                edit: `<svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a.996.996 0 0 0 0-1.41l-2.34-2.34a.996.996 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`,
                // ゴミ箱アイコン
                trash: `<svg viewBox="0 0 24 24"><path d="M9 3v1H4v2h1v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h1V4h-5V3H9m0 5h2v9H9V8m4 0h2v9h-2V8z"/></svg>`
            },

            tiers: ["HT2", "HT3", "HT4", "HT5", "LT1", "LT2", "LT3", "LT4", "LT5"],
            subTiers: ["High", "Mid High", "Mid", "Mid Low", "Low"],

            players: {},
            myId: null,
            client: null,
            editingCat: '',
            isChangingName: false,

            init: function() {
                this.buildTierButtons();
                this.myId = localStorage.getItem('bx_uid_v5');
                const myName = localStorage.getItem('bx_name_v5');

                this.connectMQTT();

                if (!this.myId || !myName) {
                    this.openNameModal(false);
                } else {
                    this.players[this.myId] = { id: this.myId, name: myName, sfc: 'Unranked', ugd: 'Unranked' };
                    const savedTiers = localStorage.getItem('bx_tiers_v5');
                    if (savedTiers) {
                        const t = JSON.parse(savedTiers);
                        this.players[this.myId].sfc = t.sfc || 'Unranked';
                        this.players[this.myId].ugd = t.ugd || 'Unranked';
                    }
                    this.renderList();
                }
            },

            openNameModal: function(isChange) {
                this.isChangingName = isChange;
                document.getElementById('name-modal-title').innerText = isChange ? 'CHANGE NAME' : 'ENTER NAME';
                document.getElementById('btn-submit-name').innerText = isChange ? 'UPDATE' : 'JOIN';
                document.getElementById('username').value = isChange ? localStorage.getItem('bx_name_v5') : '';
                document.getElementById('name-error').innerText = '';
                document.getElementById('modal-name').style.display = 'flex';
            },

            submitName: function() {
                const nameInput = document.getElementById('username').value.trim();
                const errorDiv = document.getElementById('name-error');
                
                const regex = /^[a-zA-Z0-9_]{3,15}$/;
                if (!regex.test(nameInput)) {
                    errorDiv.innerText = "Invalid format or too short.";
                    return;
                }

                const lowerName = nameInput.toLowerCase();
                for (const id in this.players) {
                    if (id !== this.myId && this.players[id].name.toLowerCase() === lowerName) {
                        errorDiv.innerText = "This name is already taken.";
                        return;
                    }
                }

                errorDiv.innerText = "";
                
                if (!this.myId) {
                    this.myId = 'u_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('bx_uid_v5', this.myId);
                    this.players[this.myId] = { id: this.myId, name: nameInput, sfc: 'Unranked', ugd: 'Unranked' };
                } else {
                    this.players[this.myId].name = nameInput;
                }

                localStorage.setItem('bx_name_v5', nameInput);
                document.getElementById('modal-name').style.display = 'none';
                
                this.renderList();
                this.publishMyData();
            },

            // 自己削除機能
            deleteMe: function() {
                if (confirm("Are you sure you want to delete your profile from the rankings?")) {
                    // 他のクライアントにも削除を通知
                    if (this.client && this.client.connected) {
                        this.client.publish(this.topic, JSON.stringify({ type: 'delete', id: this.myId }));
                    }
                    
                    // ローカルデータを消去
                    delete this.players[this.myId];
                    localStorage.removeItem('bx_uid_v5');
                    localStorage.removeItem('bx_name_v5');
                    localStorage.removeItem('bx_tiers_v5');
                    
                    this.myId = null;
                    this.renderList();
                    
                    // 最初からやり直すために登録画面を出す
                    this.openNameModal(false);
                }
            },

            renderList: function() {
                const list = document.getElementById('list');
                list.innerHTML = '';

                const arr = Object.values(this.players);
                arr.sort(function(a, b) { return a.id.localeCompare(b.id); });

                for (let i = 0; i < arr.length; i++) {
                    const p = arr[i];
                    const isMe = (p.id === this.myId);
                    const sfcClass = 't-' + p.sfc.substring(0, 2);
                    const ugdClass = 't-' + p.ugd.substring(0, 2);

                    list.innerHTML += `
                        <div class="row ${isMe ? 'is-me' : ''}">
                            <div class="rank">${i + 1}</div>
                            <div class="name-wrapper">
                                <div class="name">${p.name}</div>
                                ${isMe ? `
                                    <button class="action-btn" onclick="app.openNameModal(true)" title="Change Name">${this.icons.edit}</button>
                                    <button class="action-btn del" onclick="app.deleteMe()" title="Delete Profile">${this.icons.trash}</button>
                                ` : ''}
                            </div>
                            <div class="tier-cell">
                                <div class="icon" ${isMe ? `onclick="app.openEdit('sfc')"` : ''}>${this.icons.sfc}</div>
                                <div class="tier-text ${sfcClass}">${p.sfc.replace(' ', '<br>')}</div>
                            </div>
                            <div class="tier-cell">
                                <div class="icon" ${isMe ? `onclick="app.openEdit('ugd')"` : ''}>${this.icons.ugd}</div>
                                <div class="tier-text ${ugdClass}">${p.ugd.replace(' ', '<br>')}</div>
                            </div>
                        </div>
                    `;
                }
            },

            buildTierButtons: function() {
                const div = document.getElementById('tier-btns');
                
                // Unrankedボタン
                const unBtn = document.createElement('button');
                unBtn.className = 't-btn full-width';
                unBtn.innerText = 'Unranked';
                unBtn.onclick = function() { app.setTier('Unranked'); };
                div.appendChild(unBtn);

                // HT, LT ボタン
                for (let i = 0; i < this.tiers.length; i++) {
                    for (let j = 0; j < this.subTiers.length; j++) {
                        const tierStr = this.tiers[i] + ' ' + this.subTiers[j];
                        const btn = document.createElement('button');
                        btn.className = 't-btn';
                        btn.innerText = tierStr;
                        btn.onclick = function() { app.setTier(tierStr); };
                        div.appendChild(btn);
                    }
                }
            },

            openEdit: function(cat) {
                this.editingCat = cat;
                document.getElementById('edit-title').innerText = (cat === 'sfc' ? 'SURFACE TIER' : 'UNDERG TIER');
                document.getElementById('modal-edit').style.display = 'flex';
            },

            setTier: function(tierStr) {
                this.players[this.myId][this.editingCat] = tierStr;
                localStorage.setItem('bx_tiers_v5', JSON.stringify({
                    sfc: this.players[this.myId].sfc,
                    ugd: this.players[this.myId].ugd
                }));
                
                this.renderList();
                document.getElementById('modal-edit').style.display = 'none';
                this.publishMyData();
            },

            connectMQTT: function() {
                const options = { clientId: 'bx_' + Math.random().toString(16).substr(2, 8) };
                this.client = mqtt.connect(this.brokerUrl, options);

                this.client.on('connect', () => {
                    this.client.subscribe(this.topic);
                    if (this.myId && this.players[this.myId]) {
                        this.client.publish(this.topic, JSON.stringify({ type: 'sync_req', p: this.players[this.myId] }));
                    }
                });

                this.client.on('message', (topic, message) => {
                    try {
                        const data = JSON.parse(message.toString());
                        
                        // 誰かが自分を削除した時の処理
                        if (data.type === 'delete' && data.id) {
                            delete this.players[data.id];
                            this.renderList();
                            return;
                        }

                        // 更新・追加の処理
                        const remotePlayer = data.p;
                        if (remotePlayer && remotePlayer.id) {
                            this.players[remotePlayer.id] = remotePlayer;
                            this.renderList();

                            // 同期リクエストがあれば返信する
                            if (data.type === 'sync_req' && remotePlayer.id !== this.myId && this.myId && this.players[this.myId]) {
                                this.publishMyData();
                            }
                        }
                    } catch (err) {}
                });
            },

            publishMyData: function() {
                if (this.client && this.client.connected && this.myId && this.players[this.myId]) {
                    this.client.publish(this.topic, JSON.stringify({ type: 'update', p: this.players[this.myId] }));
                }
            }
        };

        window.onclick = function(e) {
            if (e.target.classList.contains('modal') && e.target.id !== 'modal-name') {
                e.target.style.display = 'none';
            }
        };

        document.getElementById('username').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') app.submitName();
        });

        window.onload = function() {
            app.init();
        };
    </script>
</body>
</html>
