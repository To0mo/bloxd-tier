<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bloxd Tier Rankings</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- ユーザー指定のCDN -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        :root {
            --bg: #090a0f;
            --card: #12141c;
            --border: #232736;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --tier-ht: #f59e0b; /* HT色 */
            --tier-lt: #8b5cf6; /* LT色 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 20px 10px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        /* エラー表示用（通常は隠れる） */
        #debug-log {
            color: #ff4444; font-size: 11px; font-family: monospace;
            background: rgba(255,0,0,0.1); padding: 10px; border-radius: 4px;
            margin-bottom: 10px; display: none; white-space: pre-wrap;
        }

        /* --- Header --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .status-box {
            display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700;
            color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: #eab308; }
        .dot.connected { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .dot.error { background-color: #ef4444; }

        /* --- Table --- */
        .table-header {
            display: grid; grid-template-columns: 40px 1fr 90px 90px;
            padding: 0 16px 12px; font-size: 11px; font-weight: 700; color: var(--text-muted);
        }

        .list { display: flex; flex-direction: column; gap: 8px; }

        .row {
            display: grid; grid-template-columns: 40px 1fr 90px 90px; align-items: center;
            background-color: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 16px;
        }
        .row.is-me { border-color: var(--accent); background: #171b28; }

        .rank { font-weight: 700; color: var(--text-muted); font-size: 15px; }
        .name { font-weight: 700; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px;}

        /* --- Icons --- */
        .tier-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .icon {
            width: 38px; height: 38px; background: #1a1d27; border: 1px solid var(--border);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        .icon svg { width: 22px; height: 22px; fill: var(--text-muted); }
        .is-me .icon { cursor: pointer; border-color: #334155; }
        .is-me .icon:hover { border-color: var(--accent); background: #1e293b; }
        .is-me .icon:hover svg { fill: var(--text-main); }

        .tier-text { font-size: 10px; font-weight: 900; text-align: center; line-height: 1.2; }
        .t-HT { color: var(--tier-ht); }
        .t-LT { color: var(--tier-lt); }

        /* --- Modals --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--card); width: 90%; max-width: 420px;
            border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-align: center;
        }
        h2 { font-size: 22px; margin-bottom: 20px; font-weight: 900; }
        input {
            width: 100%; padding: 16px; background: var(--bg); border: 1px solid var(--border);
            color: white; border-radius: 8px; font-size: 16px; margin-bottom: 20px; font-family: inherit; font-weight: 600;
        }
        .btn {
            width: 100%; padding: 16px; background: var(--accent); color: white;
            border: none; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer;
        }
        .tier-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 50vh; overflow-y: auto;
        }
        .t-btn {
            background: #1a1d27; border: 1px solid var(--border); color: var(--text-main);
            padding: 14px 10px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer;
        }
        .t-btn:hover { border-color: var(--accent); color: var(--accent); background: #1e293b; }

        @media (max-width: 480px) {
            .table-header, .row { grid-template-columns: 30px 1fr 75px 75px; padding: 10px; gap: 4px; }
            .icon { width: 34px; height: 34px; }
            .icon svg { width: 18px; height: 18px; }
            .tier-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- エラー出力用 -->
        <div id="debug-log"></div>

        <header class="header">
            <h1>RANKINGS</h1>
            <div class="status-box">
                <div id="dot" class="dot"></div>
                <span id="status-text">Init...</span>
            </div>
        </header>

        <div class="table-header">
            <div>#</div>
            <div>Player</div>
            <div style="text-align: center;">SURFACE</div>
            <div style="text-align: center;">UNDERG</div>
        </div>

        <!-- 初期状態は Loading... にしておく -->
        <div id="list" class="list">
            <div style="text-align: center; padding: 40px; color: #64748b; font-weight: 700;">
                Loading Rankings...
            </div>
        </div>
    </div>

    <!-- 登録モーダル -->
    <div id="modal-reg" class="modal">
        <div class="modal-content">
            <h2>ENTER NAME</h2>
            <input type="text" id="username" placeholder="Your Name" maxlength="15">
            <button class="btn" onclick="app.register()">JOIN</button>
        </div>
    </div>

    <!-- 編集モーダル -->
    <div id="modal-edit" class="modal">
        <div class="modal-content">
            <h2 id="edit-title">SELECT TIER</h2>
            <div id="tier-btns" class="tier-grid"></div>
        </div>
    </div>

    <script>
        // === 万が一JSエラーが起きたら画面に表示する仕組み ===
        window.onerror = function(msg, url, line) {
            const log = document.getElementById('debug-log');
            log.style.display = 'block';
            log.innerText += `\nError: ${msg} (Line: ${line})`;
        };

        // アプリケーション全体を一つのオブジェクトにまとめる（スコープ汚染とエラー防止）
        const app = {
            // ユーザー指定のShiftr.io
            brokerUrl: 'wss://public:public@public.cloud.shiftr.io',
            topic: 'bloxd/global/tier_list',
            
            // アイコン (交差する剣 / 上向きスパイク)
            icons: {
                sfc: `<svg viewBox="0 0 24 24"><path d="M19.7,4.3c-0.4-0.4-1-0.4-1.4,0L12,10.6L5.7,4.3c-0.4-0.4-1-0.4-1.4,0s-0.4,1,0,1.4l6.3,6.3l-6.3,6.3c-0.4,0.4-0.4,1,0,1.4C4.5,19.9,4.7,20,5,20s0.5-0.1,0.7-0.3l6.3-6.3l6.3,6.3c0.2,0.2,0.5,0.3,0.7,0.3s0.5-0.1,0.7-0.3c0.4-0.4,0.4-1,0-1.4L13.4,12l6.3-6.3C20.1,5.3,20.1,4.7,19.7,4.3z"/></svg>`,
                ugd: `<svg viewBox="0 0 24 24"><path d="M12,2L8,12h3v10h2V12h3L12,2z M4,8l-3,8h2v6h2v-6h2L4,8z M20,8l-3,8h2v6h2v-6h2L20,8z"/></svg>`
            },

            // MT廃止、HTとLTのみ
            tiers: ["HT2", "HT3", "HT4", "HT5", "LT1", "LT2", "LT3", "LT4", "LT5"],
            subTiers: ["High", "Mid High", "Mid", "Mid Low", "Low"],

            players: {},
            myId: null,
            client: null,
            editingCat: '',

            init: function() {
                try {
                    this.buildTierButtons();
                    
                    this.myId = localStorage.getItem('bx_uid_shiftr');
                    const myName = localStorage.getItem('bx_name_shiftr');

                    // 最初からテストデータを2つ入れておく（絶対にUIが空にならないように）
                    this.players['test1'] = { id: 'test1', name: 'Server_Host', sfc: 'HT2 High', ugd: 'HT3 Mid' };
                    this.players['test2'] = { id: 'test2', name: 'Pro_Player', sfc: 'LT1 Low', ugd: 'LT2 High' };

                    if (!this.myId || !myName) {
                        document.getElementById('modal-reg').style.display = 'flex';
                        this.setStatus('Waiting Login', '');
                        this.renderList(); // テストデータだけ描画
                    } else {
                        // 自分のデータをセット
                        this.players[this.myId] = { id: this.myId, name: myName, sfc: 'LT5 Low', ugd: 'LT5 Low' };
                        this.renderList();
                        this.connectMQTT();
                    }
                } catch (e) {
                    window.onerror(e.message, 'init', 0);
                }
            },

            register: function() {
                try {
                    const name = document.getElementById('username').value.trim();
                    if (name.length < 2) return;
                    
                    this.myId = 'u_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('bx_uid_shiftr', this.myId);
                    localStorage.setItem('bx_name_shiftr', name);

                    this.players[this.myId] = { id: this.myId, name: name, sfc: 'LT5 Low', ugd: 'LT5 Low' };
                    document.getElementById('modal-reg').style.display = 'none';
                    
                    this.renderList();
                    this.connectMQTT();
                } catch (e) {
                    window.onerror(e.message, 'register', 0);
                }
            },

            renderList: function() {
                const list = document.getElementById('list');
                list.innerHTML = ''; // Loading文字を消す

                const arr = Object.values(this.players);
                // 簡易ソート（自分が上の方に来るように）
                arr.sort(function(a, b) { return b.id.localeCompare(a.id); });

                for (let i = 0; i < arr.length; i++) {
                    const p = arr[i];
                    const isMe = (p.id === this.myId);
                    const sfcClass = 't-' + p.sfc.substring(0, 2);
                    const ugdClass = 't-' + p.ugd.substring(0, 2);

                    list.innerHTML += `
                        <div class="row ${isMe ? 'is-me' : ''}">
                            <div class="rank">${i + 1}</div>
                            <div class="name">${p.name}</div>
                            <div class="tier-cell">
                                <div class="icon" ${isMe ? `onclick="app.openEdit('sfc')"` : ''}>${this.icons.sfc}</div>
                                <div class="tier-text ${sfcClass}">${p.sfc.replace(' ', '<br>')}</div>
                            </div>
                            <div class="tier-cell">
                                <div class="icon" ${isMe ? `onclick="app.openEdit('ugd')"` : ''}>${this.icons.ugd}</div>
                                <div class="tier-text ${ugdClass}">${p.ugd.replace(' ', '<br>')}</div>
                            </div>
                        </div>
                    `;
                }
            },

            buildTierButtons: function() {
                const div = document.getElementById('tier-btns');
                for (let i = 0; i < this.tiers.length; i++) {
                    for (let j = 0; j < this.subTiers.length; j++) {
                        const tierStr = this.tiers[i] + ' ' + this.subTiers[j];
                        const btn = document.createElement('button');
                        btn.className = 't-btn';
                        btn.innerText = tierStr;
                        btn.onclick = function() { app.setTier(tierStr); };
                        div.appendChild(btn);
                    }
                }
            },

            openEdit: function(cat) {
                this.editingCat = cat;
                document.getElementById('edit-title').innerText = (cat === 'sfc' ? 'SURFACE TIER' : 'UNDERG TIER');
                document.getElementById('modal-edit').style.display = 'flex';
            },

            setTier: function(tierStr) {
                this.players[this.myId][this.editingCat] = tierStr;
                this.renderList();
                document.getElementById('modal-edit').style.display = 'none';

                if (this.client && this.client.connected) {
                    this.client.publish(this.topic, JSON.stringify({ type: 'upd', p: this.players[this.myId] }));
                }
            },

            connectMQTT: function() {
                if (typeof mqtt === 'undefined') {
                    this.setStatus('MQTT Blocked', 'error');
                    return;
                }

                this.setStatus('Connecting...', '');
                
                // 接続時のオプションを指定 (shiftr.io向け)
                const options = {
                    clientId: 'bloxd_' + Math.random().toString(16).substr(2, 8)
                };

                this.client = mqtt.connect(this.brokerUrl, options);

                this.client.on('connect', () => {
                    this.setStatus('Live Sync', 'connected');
                    this.client.subscribe(this.topic);
                    
                    // 接続したら自分の情報を送信
                    this.client.publish(this.topic, JSON.stringify({ type: 'sync', p: this.players[this.myId] }));
                });

                this.client.on('message', (topic, message) => {
                    try {
                        const data = JSON.parse(message.toString());
                        // テストデータは上書きしない
                        if (data.p && !data.p.id.startsWith('test')) {
                            this.players[data.p.id] = data.p;
                            this.renderList();
                        }
                        // 同期リクエストが来たら、自分のデータを打ち返す
                        if (data.type === 'sync' && data.p.id !== this.myId) {
                            this.client.publish(this.topic, JSON.stringify({ type: 'upd', p: this.players[this.myId] }));
                        }
                    } catch (err) {
                        // JSONパースエラー等は無視
                    }
                });

                this.client.on('error', (err) => {
                    this.setStatus('Shiftr.io Error', 'error');
                });
            },

            setStatus: function(text, cName) {
                document.getElementById('status-text').innerText = text;
                document.getElementById('dot').className = 'dot ' + cName;
            }
        };

        // モーダル外クリックで閉じる
        window.onclick = function(e) {
            if (e.target.classList.contains('modal')) e.target.style.display = 'none';
        };

        // ページ読み込み完了時に実行
        window.onload = function() {
            app.init();
        };

    </script>
</body>
</html>
