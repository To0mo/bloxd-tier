<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>🛡️ Simple Client - Admin Control Panel</title>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f0f12; --bg-sidebar: #16161a; --bg-item: #1c1c21;
            --border: rgba(255,255,255,0.08); --text: #e0e0e0; --muted: #888;
            --primary: #3b82f6; --accent: #f59e0b; --danger: #ef4444; --success: #10b981;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .sidebar { width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        .user-list-area { width: 240px; background: var(--bg-sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; }

        .header { padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: bold; font-size: 14px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
        
        /* Chat Area */
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 6px; background: var(--bg-item); border: 1px solid var(--border); max-width: 85%; position: relative; }
        .msg.admin { border-left: 3px solid var(--accent); background: rgba(245, 158, 11, 0.05); }
        .msg .meta { font-size: 10px; color: var(--muted); margin-bottom: 4px; display: flex; gap: 10px; }
        .msg .name { font-weight: bold; color: var(--primary); }
        .msg.admin .name { color: var(--accent); }
        .msg .body { font-size: 13px; line-height: 1.5; word-break: break-all; }

        /* Input Area */
        .input-box { padding: 15px 20px; background: var(--bg-sidebar); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: var(--bg-dark); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; outline: none; font-size: 13px; }
        button { background: var(--primary); border: none; color: white; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* User List */
        #user-list { list-style: none; padding: 10px; margin: 0; overflow-y: auto; flex: 1; }
        #user-list li { padding: 8px 12px; border-radius: 5px; margin-bottom: 2px; font-size: 13px; cursor: pointer; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #user-list li:hover { background: var(--hover-color, rgba(255,255,255,0.05)); }
        #user-list li.me { color: var(--primary); font-weight: bold; }

        /* Custom Context Menu */
        #context-menu {
            position: fixed; display: none; background: #1c1c21; border: 1px solid #333; 
            border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 10000; width: 180px; padding: 5px 0;
        }
        .menu-item { padding: 10px 15px; font-size: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background: var(--primary); color: white; }
        .menu-item.danger:hover { background: var(--danger); }
        .menu-divider { height: 1px; background: var(--border); margin: 5px 0; }

        /* Status Indicator */
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #222; border: 1px solid var(--border); }
        .online-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--success); margin-right: 5px; }
    </style>
</head>
<body>

    <!-- サイドバー -->
    <div class="sidebar">
        <div class="header">SYSTEM STATUS</div>
        <div style="padding: 20px;">
            <div style="margin-bottom: 20px;">
                <label style="font-size: 11px; color: var(--muted);">TARGET TOPIC</label>
                <div style="font-size: 13px; margin-top: 5px; word-break: break-all;" id="display-topic">tm_chat_v12_bloxd_io</div>
            </div>
            <button id="conn-btn" style="width: 100%; height: 40px;">CONNECT TO CHAT</button>
            <div id="crypto-indicator" style="margin-top: 20px; font-size: 12px; color: var(--danger);">
                ● AES Key: Missing (Encrypted)
            </div>
        </div>
    </div>

    <!-- メインチャット -->
    <div class="main-chat">
        <div class="header">
            DECRYPTED CHAT FEED
            <div class="status-badge" id="conn-badge">OFFLINE</div>
        </div>
        <div id="chat-flow"></div>
        <div class="input-box">
            <input type="text" id="msg-input" placeholder="Type a message as Admin..." disabled>
            <button id="send-btn" disabled>SEND</button>
        </div>
    </div>

    <!-- ユーザーリスト -->
    <div class="user-list-area">
        <div class="header">ONLINE (<span id="user-count">0</span>)</div>
        <ul id="user-list"></ul>
    </div>

    <!-- 右クリックメニュー -->
    <div id="context-menu">
        <div class="menu-item" onclick="copyUserId()">🆔 Copy User ID</div>
        <div class="menu-divider"></div>
        <div class="menu-item" style="color: var(--accent);" onclick="modAction('timeout')">⏳ Timeout (Kick)</div>
        <div class="menu-item danger" style="color: var(--danger);" onclick="modAction('ban')">🚫 Perma BAN</div>
    </div>

    <script>
        // 固定設定
        const FIXED_TOPIC = 'tm_chat_v12_bloxd_io';
        const BROKER = 'wss://broker.emqx.io:8084/mqtt';
        const ADMIN_NAME = '🛡️ GLOBAL ADMIN';

        // Crypto Module (Simple Client互換)
        const ChatCrypto = {
            rsaKeys: null, aesKey: null,
            async init() {
                this.rsaKeys = await crypto.subtle.generateKey(
                    { name: 'RSA-OAEP', modulusLength: 2048, publicExponent: new Uint8Array([1,0,1]), hash: 'SHA-256' },
                    true, ['encrypt', 'decrypt']
                );
            },
            async getPubKey() { return JSON.stringify(await crypto.subtle.exportKey('jwk', this.rsaKeys.publicKey)); },
            async importKey(jwk, type, usage) { return await crypto.subtle.importKey('jwk', JSON.parse(jwk), { name: type, hash: 'SHA-256' }, true, usage); },
            async decryptRsa(b64) {
                try {
                    const data = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
                    const dec = await crypto.subtle.decrypt({ name: 'RSA-OAEP' }, this.rsaKeys.privateKey, data);
                    return new TextDecoder().decode(dec);
                } catch { return null; }
            },
            async encryptAes(text) {
                if (!this.aesKey) return null;
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, this.aesKey, new TextEncoder().encode(text));
                return btoa(String.fromCharCode.apply(null, iv)) + '.' + btoa(String.fromCharCode.apply(null, new Uint8Array(enc)));
            },
            async decryptAes(b64) {
                if (!this.aesKey) return null;
                try {
                    const [iv_b64, data_b64] = b64.split('.');
                    const iv = Uint8Array.from(atob(iv_b64), c => c.charCodeAt(0));
                    const data = Uint8Array.from(atob(data_b64), c => c.charCodeAt(0));
                    const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, this.aesKey, data);
                    return new TextDecoder().decode(dec);
                } catch { return null; }
            }
        };

        let client = null;
        let adminId = 'adm-' + Math.random().toString(36).substr(2, 5);
        let onlineUsers = new Map();
        let menuTargetId = null;

        const chatFlow = document.getElementById('chat-flow');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const userListEl = document.getElementById('user-list');
        const ctxMenu = document.getElementById('context-menu');

        // 接続
        document.getElementById('conn-btn').onclick = async function() {
            this.disabled = true;
            this.textContent = 'CONNECTING...';
            
            await ChatCrypto.init();
            client = mqtt.connect(BROKER);

            client.on('connect', async () => {
                document.getElementById('conn-badge').textContent = 'CONNECTED';
                document.getElementById('conn-badge').style.color = 'var(--success)';
                this.textContent = 'CONNECTED';
                msgInput.disabled = false; sendBtn.disabled = false;

                client.subscribe(FIXED_TOPIC);
                client.publish(FIXED_TOPIC, JSON.stringify({
                    type: 'join', id: adminId, name: ADMIN_NAME, key: await ChatCrypto.getPubKey()
                }));
            });

            client.on('message', async (topic, message) => {
                const data = JSON.parse(message.toString());
                switch(data.type) {
                    case 'join':
                    case 'ack':
                        onlineUsers.set(data.id, data.name);
                        updateUserList();
                        break;
                    case 'leave':
                        onlineUsers.delete(data.id);
                        updateUserList();
                        break;
                    case 'aes_key':
                        const jwk = await ChatCrypto.decryptRsa(data.key);
                        if (jwk) {
                            ChatCrypto.aesKey = await ChatCrypto.importKey(jwk, 'AES-GCM', ['encrypt', 'decrypt']);
                            const ind = document.getElementById('crypto-indicator');
                            ind.textContent = '● AES Key: Active (Decrypted)';
                            ind.style.color = 'var(--success)';
                        }
                        break;
                    case 'msg':
                        let text = '（暗号化されたメッセージ）';
                        if (ChatCrypto.aesKey) {
                            text = await ChatCrypto.decryptAes(data.payload) || '[復号エラー]';
                        }
                        addMessage(data.name, text, data.id === adminId, false);
                        break;
                    case 'admin_msg':
                        addMessage(data.name, data.text, data.id === adminId, true);
                        break;
                }
            });
        };

        function addMessage(name, text, isMe, isAdmin) {
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : ''} ${isAdmin ? 'admin' : ''}`;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `
                <div class="meta"><span class="name">${name}</span><span>${time}</span></div>
                <div class="body">${text}</div>
            `;
            chatFlow.appendChild(div);
            chatFlow.scrollTop = chatFlow.scrollHeight;
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !ChatCrypto.aesKey) return;
            const encrypted = await ChatCrypto.encryptAes(text);
            client.publish(FIXED_TOPIC, JSON.stringify({
                type: 'msg', id: adminId, name: ADMIN_NAME, payload: encrypted
            }));
            msgInput.value = '';
        }

        sendBtn.onclick = sendMessage;
        msgInput.onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };

        function updateUserList() {
            userListEl.innerHTML = '';
            onlineUsers.forEach((name, id) => {
                const li = document.createElement('li');
                li.textContent = name;
                li.dataset.id = id;
                if (id === adminId) li.classList.add('me');
                
                // 右クリックイベント
                li.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (id === adminId) return; // 自分は操作不可
                    menuTargetId = id;
                    ctxMenu.style.display = 'block';
                    ctxMenu.style.left = e.pageX + 'px';
                    ctxMenu.style.top = e.pageY + 'px';
                };

                userListEl.appendChild(li);
            });
            document.getElementById('user-count').textContent = onlineUsers.size;
        }

        // メニュー外クリックで閉じる
        window.onclick = () => ctxMenu.style.display = 'none';

        // 管理アクション
        function copyUserId() {
            navigator.clipboard.writeText(menuTargetId);
            alert('ID Copied: ' + menuTargetId);
        }

        function modAction(type) {
            if (!menuTargetId || !client) return;
            const actionType = type === 'timeout' ? 'admin_timeout' : 'admin_ban';
            const confirmMsg = type === 'timeout' ? 'タイムアウト(Kick)しますか？' : '永久BANしますか？';
            
            if (confirm(confirmMsg)) {
                client.publish(FIXED_TOPIC, JSON.stringify({
                    type: actionType,
                    targetId: menuTargetId
                }));
            }
        }
    </script>
</body>
</html>
